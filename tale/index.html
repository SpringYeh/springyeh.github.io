function password() {
  if(''){

   $('.book__desc').after('<textarea class="description" value="Please input password and press enter:" style="border: none;display: block;' +'width: 60%;margin: 0 auto;text-align: center;outline: none;margin-top: 40px;margin-bottom: 10px;resize:none ;color:#B0C4DE ">Please input password and press enter:</textarea>' +

    document.onclick = function (event) {
      var e = event || window.event;
      var elem = e.srcElement || e.target;

      while (elem) {
        if (elem != document) {
          if (elem.className == "password") {
            $(".password").animate({paddingTop:"30px",width:"100%",borderWidth:"2px"},300)
            return;
          }
          elem = elem.parentNode;
        } else {
          $(".password").animate({paddingTop:"0px",width:"95%",borderWidth:"1px"},300)
          return;
        }
      }
    }
    $(document).keyup(function(event){
      if(event.keyCode ==13&&$('.password').length>0){
        //console.log($('.password').val())
        //console.log('')
        if ($('.password').val() == '') {
          div.appendTo($('.book__desc'))
          $(".description").remove();
          $(".qiang").remove();
          $(".password").remove();  
        }else {
          alert("Sorry,the password is wrong")
        }
      }
    });
  }
}
