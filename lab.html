  <script>
	window.AudioContext = window.AudioContext || window.webkitAudioContext;
	(function () {
	    if (!window.AudioContext) { 
	        // alert('еҪ“еүҚжөҸи§ҲеҷЁдёҚж”ҜжҢҒWeb Audio API');
	        return;
	    }
	    var audioCtx = new AudioContext();
	    // еҸ‘еҮәзҡ„еЈ°йҹійў‘зҺҮж•°жҚ®пјҢиЎЁзҺ°дёәйҹіи°ғзҡ„й«ҳдҪҺ
	    // var arrFrequency = [196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
	    // ж¬ўд№җйўӮ
	    var arrFrequency = '329.628 329.628 349.228 391.995 391.995 349.228 329.628 293.665 261.626 261.626 293.665 329.628 329.628 293.665 293.665 329.628 329.628 349.228 391.995 391.995 349.228 329.628 293.665 261.626 261.626 293.665 329.628 293.665 261.626 261.626 293.665 293.665 329.628 261.626 293.665 329.628 349.228 329.628 261.626 293.665 329.628 349.228 329.628 293.665 261.626 293.665 195.998 329.628 329.628 349.228 391.995 391.995 349.228 329.628 293.665 261.626 261.626 293.665 329.628 293.665 261.626 261.626'.split(' ');
	    var start = 0, direction = 1;

	    var musicFont = 'вҷ© вҷӘ вҷ« вҷ¬ вҷӯ вҷ® вҷҜ'.split(' ');

	    var play = false;
	    $('.logo_img').mouseenter(function(e) {
	        var frequency = arrFrequency[start];
	        if (!frequency) {
	            // direction = -1 * direction;
	            // start = start + 2 * direction;
	            start = 0;
	            frequency = arrFrequency[start];
	        }
	        start = start + direction;
	        
	        // еҲӣе»әдёҖдёӘOscillatorNode, е®ғиЎЁзӨәдёҖдёӘе‘ЁжңҹжҖ§жіўеҪўпјҲжҢҜиҚЎпјүпјҢеҹәжң¬дёҠжқҘиҜҙеҲӣйҖ дәҶдёҖдёӘйҹіи°ғ
	        var oscillator = audioCtx.createOscillator();
	        // еҲӣе»әдёҖдёӘGainNode,е®ғеҸҜд»ҘжҺ§еҲ¶йҹійў‘зҡ„жҖ»йҹійҮҸ
	        var gainNode = audioCtx.createGain();
	        // жҠҠйҹійҮҸпјҢйҹіи°ғе’Ңз»ҲиҠӮзӮ№иҝӣиЎҢе…іиҒ”
	        oscillator.connect(gainNode);
	        // audioCtx.destinationиҝ”еӣһAudioDestinationNodeеҜ№иұЎпјҢиЎЁзӨәеҪ“еүҚaudio contextдёӯжүҖжңүиҠӮзӮ№зҡ„жңҖз»ҲиҠӮзӮ№пјҢдёҖиҲ¬иЎЁзӨәйҹійў‘жёІжҹ“и®ҫеӨҮ
	        gainNode.connect(audioCtx.destination);
	        // жҢҮе®ҡйҹіи°ғзҡ„зұ»еһӢпјҢе…¶д»–иҝҳжңүsquare|triangle|sawtooth
	        oscillator.type = 'sine';
	        // и®ҫзҪ®еҪ“еүҚж’ӯж”ҫеЈ°йҹізҡ„йў‘зҺҮпјҢд№ҹе°ұжҳҜжңҖз»Ҳж’ӯж”ҫеЈ°йҹізҡ„и°ғи°ғ
	        oscillator.frequency.value = frequency;
	        // еҪ“еүҚж—¶й—ҙи®ҫзҪ®йҹійҮҸдёә0
	        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
	        // 0.01з§’еҗҺйҹійҮҸдёә1
	        gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.01);
	        // йҹіи°ғд»ҺеҪ“еүҚж—¶й—ҙејҖе§Ӣж’ӯж”ҫ
	        oscillator.start(audioCtx.currentTime);
	        // 1з§’еҶ…еЈ°йҹіж…ўж…ўйҷҚдҪҺпјҢжЁЎжӢҹй’ўзҗҙеӣһе“Қзҡ„йҹіиүІ
	        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
	        // 1з§’еҗҺе®Ңе…ЁеҒңжӯўеЈ°йҹі
	        oscillator.stop(audioCtx.currentTime + 1);
	        play = true;
	        if (play) {
	            var n = Math.round(Math.random() * 7); 
	            var $i = $("<b/>").text(musicFont[n]);
	            var x = e.pageX, y = e.pageY - 5;
	            $i.css({
	                "z-index":99999,
	                "top":y - 20,
	                "left":x,
	                "position":"absolute",
	                "color":"#65dbfb"
	            });
	            $('body').append($i);
	            $i.animate(
	                { "top": y - 180, "opacity": 0 },
	                1500,
	                function() { $i.remove(); }
	            );
	            e.stopPropagation();
	        }
	        play = false;
	    })
	})();
  </script>
